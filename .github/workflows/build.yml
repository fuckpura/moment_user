name: Build Moment User

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: moment-user-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: |
          if [ -f bun.lock ]; then
            bun install --frozen-lockfile
          else
            bun install
          fi

      - name: Build
        run: bun run build:deploy

      - name: Package
        run: |
          mkdir -p artifacts
          tar -C dist -czf artifacts/moment-user-web.tar.gz .
          ls -lh artifacts/moment-user-web.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: moment-user-web
          path: artifacts/moment-user-web.tar.gz
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: moment-user-web
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/moment-user-web.tar.gz
